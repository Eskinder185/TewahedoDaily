<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="A calm daily companion for Ethiopian Orthodox mezmur, werb, tselot, and the church calendar."
    />
    <script>
      ;(function () {
        try {
          var key = 'tewahedo-theme'
          var stored = localStorage.getItem(key)
          var theme =
            stored === 'light' || stored === 'dark' || stored === 'auto' ? stored : 'auto'
          var effective =
            theme === 'auto'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : theme
          var root = document.documentElement
          root.setAttribute('data-theme', effective)
          root.style.colorScheme = effective
        } catch (e) {
          /* ignore */
        }
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Source+Sans+3:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <title>Tewahedo Daily</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
